<svg width="1280" height="480" viewBox="0 0 1280 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CodeX Photo AI planner flow</title>
  <desc id="desc">Prompt to plan to validated execution flow.</desc>
  <rect width="1280" height="480" fill="#f5faf7"/>
  <text x="64" y="68" fill="#10231c" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">AI Planner Flow</text>
  <text x="64" y="98" fill="#577166" font-family="Segoe UI, Arial, sans-serif" font-size="16">Natural language request becomes a validated edit plan, then local tools execute it step by step.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0b8f67"/>
    </marker>
  </defs>

  <rect x="70" y="150" width="208" height="160" rx="16" fill="#ffffff" stroke="#bfd8cf" stroke-width="2"/>
  <circle cx="108" cy="190" r="20" fill="#e8fff6"/>
  <text x="101" y="198" fill="#0b8f67" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">1</text>
  <text x="96" y="235" fill="#10231c" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">User prompt</text>
  <text x="96" y="265" fill="#577166" font-family="Segoe UI, Arial, sans-serif" font-size="14">Vietnamese or English</text>
  <text x="96" y="288" fill="#577166" font-family="Segoe UI, Arial, sans-serif" font-size="14">edit instruction</text>

  <path d="M 294 230 H 364" stroke="#0b8f67" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="382" y="150" width="208" height="160" rx="16" fill="#ffffff" stroke="#bfd8cf" stroke-width="2"/>
  <circle cx="420" cy="190" r="20" fill="#e8fff6"/>
  <text x="413" y="198" fill="#0b8f67" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">2</text>
  <text x="408" y="235" fill="#10231c" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Prompt compiler</text>
  <text x="408" y="265" fill="#577166" font-family="Segoe UI, Arial, sans-serif" font-size="14">Adds preservation rules,</text>
  <text x="408" y="288" fill="#577166" font-family="Segoe UI, Arial, sans-serif" font-size="14">allowed tools and presets</text>

  <path d="M 606 230 H 676" stroke="#0b8f67" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="694" y="150" width="208" height="160" rx="16" fill="#ffffff" stroke="#bfd8cf" stroke-width="2"/>
  <circle cx="732" cy="190" r="20" fill="#e8fff6"/>
  <text x="725" y="198" fill="#0b8f67" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">3</text>
  <text x="720" y="235" fill="#10231c" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Planner API</text>
  <text x="720" y="265" fill="#577166" font-family="Segoe UI, Arial, sans-serif" font-size="14">Returns JSON plan</text>
  <text x="720" y="288" fill="#577166" font-family="Segoe UI, Arial, sans-serif" font-size="14">or local demo plan</text>

  <path d="M 918 230 H 988" stroke="#0b8f67" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="1006" y="150" width="208" height="160" rx="16" fill="#ffffff" stroke="#bfd8cf" stroke-width="2"/>
  <circle cx="1044" cy="190" r="20" fill="#e8fff6"/>
  <text x="1037" y="198" fill="#0b8f67" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">4</text>
  <text x="1032" y="235" fill="#10231c" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Schema + tools</text>
  <text x="1032" y="265" fill="#577166" font-family="Segoe UI, Arial, sans-serif" font-size="14">Normalize, validate,</text>
  <text x="1032" y="288" fill="#577166" font-family="Segoe UI, Arial, sans-serif" font-size="14">then execute safely</text>

  <rect x="316" y="358" width="648" height="56" rx="14" fill="#103328"/>
  <text x="344" y="392" fill="#c9fff0" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Result: preview, before/after compare, history restore, export preset</text>
</svg>
